syntax = "proto3";

package api.v1;

option go_package = "github.com/squall-chua/go-support-ticket/api/v1;apiv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "api/proto/v1/common.proto";
import "google/api/annotations.proto";
import "api/proto/v1/options.proto";

enum TicketStatus {
  TICKET_STATUS_UNSPECIFIED = 0;
  TICKET_STATUS_OPEN = 1;
  TICKET_STATUS_IN_PROGRESS = 2;
  TICKET_STATUS_PENDING_APPROVAL = 3;
  TICKET_STATUS_RESOLVED = 4;
  TICKET_STATUS_CLOSED = 5;
  TICKET_STATUS_MERGED = 6;
}

enum TicketPriority {
  TICKET_PRIORITY_UNSPECIFIED = 0;
  TICKET_PRIORITY_LOW = 1;
  TICKET_PRIORITY_MEDIUM = 2;
  TICKET_PRIORITY_HIGH = 3;
  TICKET_PRIORITY_URGENT = 4;
}

message Comment {
  string id = 1;
  string author = 2;
  string content = 3;
  google.protobuf.Timestamp created_at = 4;
  map<string, google.protobuf.Value> metadata = 5;
}

message AddCommentRequest {
  string ticket_id = 1;
  string author = 2;
  string content = 3;
  map<string, google.protobuf.Value> metadata = 4;
}

message AddCommentResponse {
  Comment comment = 1;
}

message TicketType {
  string id = 1;
  string name = 2;
  string display_name = 3;
  string description = 4;
  bool require_approval = 5;
  bool auto_visible = 6;
  bool activated = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  optional google.protobuf.Timestamp deleted_at = 10;
}

message Ticket {
  string id = 1;
  string title = 2;
  string description = 3;
  string ticket_type = 4;
  TicketStatus status = 5;
  TicketPriority priority = 6;
  string customer_id = 7;
  string created_by = 8;
  string assigned_to = 9;
  string merged_into = 10;
  repeated Comment comments = 11;
  map<string, google.protobuf.Value> metadata = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  optional google.protobuf.Timestamp deleted_at = 15;
}

message CreateTicketTypeRequest {
  string name = 1;
  string display_name = 2;
  string description = 3;
  bool require_approval = 4;
  bool auto_visible = 5;
  bool activated = 6;
}

message CreateTicketTypeResponse {
  TicketType ticket_type = 1;
}

message TicketTypeSort {
  enum Field {
    FIELD_UNSPECIFIED = 0;
    FIELD_CREATED_AT = 1;
    FIELD_UPDATED_AT = 2;
    FIELD_NAME = 3;
  }
  Field field = 1;
  SortOrder order = 2;
}

message ListTicketTypesRequest {
  optional string name = 1;
  optional string display_name = 2;
  optional string description = 3;
  optional bool require_approval = 4;
  optional bool auto_visible = 5;
  optional bool activated = 6;
  
  repeated TicketTypeSort sorts = 10;
  PageRequest pagination = 11;
  
  bool include_deleted = 12;
}

message ListTicketTypesResponse {
  repeated TicketType ticket_types = 1;
  PageInfo pagination = 2;
}

message UpdateTicketTypeRequest {
  string id = 1;
  optional string display_name = 2;
  optional string description = 3;
  optional bool require_approval = 4;
  optional bool auto_visible = 5;
  optional bool activated = 6;
}

message UpdateTicketTypeResponse {
  TicketType ticket_type = 1;
}

message DeleteTicketTypeRequest {
  string id = 1;
}

message DeleteTicketTypeResponse {}

message CreateTicketRequest {
  string title = 1;
  string description = 2;
  string ticket_type = 3;
  TicketPriority priority = 4;
  string customer_id = 5;
  map<string, google.protobuf.Value> metadata = 6;
}

message CreateTicketResponse {
  Ticket ticket = 1;
}

message GetTicketRequest {
  string ticket_id = 1;
}

message GetTicketResponse {
  Ticket ticket = 1;
}

message UpdateTicketRequest {
  string ticket_id = 1;
  optional string title = 2;
  optional string description = 3;
  optional TicketPriority priority = 4;
  optional string ticket_type = 5;
  optional TicketStatus status = 6;
  map<string, google.protobuf.Value> metadata = 7;
}

message UpdateTicketResponse {
  Ticket ticket = 1;
}

message AssignTicketRequest {
  string ticket_id = 1;
  string assign_to = 2;
}

message AssignTicketResponse {
  Ticket ticket = 1;
}

message DistributeTicketsRequest {
  repeated TicketAssignment assignments = 1;
}

message TicketAssignment {
  string ticket_id = 1;
  string assign_to = 2;
}

message DistributeTicketsResponse {
  int32 modified_count = 1;
}

message MergeTicketsRequest {
  string source_ticket_id = 1;
  string target_ticket_id = 2;
}

message MergeTicketsResponse {
  Ticket source_ticket = 1; // updated to MERGED state
  Ticket target_ticket = 2;
}

message TicketSort {
  enum Field {
    FIELD_UNSPECIFIED = 0;
    FIELD_PRIORITY = 1;
    FIELD_CREATED_AT = 2;
    FIELD_UPDATED_AT = 3;
  }
  Field field = 1;
  SortOrder order = 2;
}

message ListTicketsRequest {
  // Filtering
  repeated TicketStatus statuses = 1;
  repeated string assigned_to = 2;
  optional string title_contains = 3;
  optional string description_contains = 4;
  repeated string ticket_type = 5;
  repeated TicketPriority priority = 6;
  repeated string customer_id = 7;
  repeated string created_by = 8;
  repeated string merged_into = 9;
  map<string, google.protobuf.Value> metadata = 10;

  // Sorting
  repeated TicketSort sort = 11;

  // Pagination
  PageRequest pagination = 12;

  bool include_deleted = 13;
}

message ListTicketsResponse {
  repeated Ticket tickets = 1;
  PageInfo pagination = 2;
}

message DeleteTicketRequest {
  string ticket_id = 1;
}

message DeleteTicketResponse {
  bool success = 1;
}

service TicketService {
  // Ticket Type
  rpc CreateTicketType(CreateTicketTypeRequest) returns (CreateTicketTypeResponse) {
    option (google.api.http) = {
      post: "/api/v1/ticket-types"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["admin:ticket-types"]
      required_roles: ["admin"]
    };
  }
  rpc ListTicketTypes(ListTicketTypesRequest) returns (ListTicketTypesResponse) {
    option (google.api.http) = {
      get: "/api/v1/ticket-types"
    };
    option (auth.v1.rule) = {
      required_scopes: ["read:tickets"]
    };
  }
  rpc UpdateTicketType(UpdateTicketTypeRequest) returns (UpdateTicketTypeResponse) {
    option (google.api.http) = {
      put: "/api/v1/ticket-types/{id}"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["admin:ticket-types"]
      required_roles: ["admin"]
    };
  }
  rpc DeleteTicketType(DeleteTicketTypeRequest) returns (DeleteTicketTypeResponse) {
    option (google.api.http) = {
      delete: "/api/v1/ticket-types/{id}"
    };
    option (auth.v1.rule) = {
      required_scopes: ["admin:ticket-types"]
      required_roles: ["admin"]
    };
  }

  // Ticket
  rpc CreateTicket(CreateTicketRequest) returns (CreateTicketResponse) {
    option (google.api.http) = {
      post: "/api/v1/tickets"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:tickets"]
    };
  }
  rpc GetTicket(GetTicketRequest) returns (GetTicketResponse) {
    option (google.api.http) = {
      get: "/api/v1/tickets/{ticket_id}"
    };
    option (auth.v1.rule) = {
      required_scopes: ["read:tickets"]
    };
  }
  rpc UpdateTicket(UpdateTicketRequest) returns (UpdateTicketResponse) {
    option (google.api.http) = {
      put: "/api/v1/tickets/{ticket_id}"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:tickets"]
    };
  }
  rpc AssignTicket(AssignTicketRequest) returns (AssignTicketResponse) {
    option (google.api.http) = {
      post: "/api/v1/tickets/{ticket_id}/assign"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:tickets"]
      required_roles: ["admin", "agent"]
    };
  }
  rpc DistributeTickets(DistributeTicketsRequest) returns (DistributeTicketsResponse) {
    option (google.api.http) = {
      post: "/api/v1/tickets/distribute"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:tickets"]
      required_roles: ["admin"]
    };
  }
  rpc MergeTickets(MergeTicketsRequest) returns (MergeTicketsResponse) {
    option (google.api.http) = {
      post: "/api/v1/tickets/merge"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:tickets"]
      required_roles: ["admin", "agent"]
    };
  }
  rpc ListTickets(ListTicketsRequest) returns (ListTicketsResponse) {
    option (google.api.http) = {
      get: "/api/v1/tickets"
    };
    option (auth.v1.rule) = {
      required_scopes: ["read:tickets"]
    };
  }
  rpc AddComment(AddCommentRequest) returns (AddCommentResponse) {
    option (google.api.http) = {
      post: "/api/v1/tickets/{ticket_id}/comments"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:tickets"]
    };
  }
  rpc DeleteTicket(DeleteTicketRequest) returns (DeleteTicketResponse) {
    option (google.api.http) = {
      delete: "/api/v1/tickets/{ticket_id}"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:tickets"]
      required_roles: ["admin"]
    };
  }
}
