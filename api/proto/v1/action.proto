syntax = "proto3";

package api.v1;

option go_package = "github.com/squall-chua/go-support-ticket/api/v1;apiv1";

import "google/protobuf/timestamp.proto";
import "api/proto/v1/common.proto";
import "google/api/annotations.proto";

enum FieldType {
  FIELD_TYPE_UNSPECIFIED = 0;
  FIELD_TYPE_STRING = 1;
  FIELD_TYPE_NUMBER = 2;
  FIELD_TYPE_BOOLEAN = 3;
  FIELD_TYPE_ENUM = 4;
  FIELD_TYPE_OBJECT = 5;
  FIELD_TYPE_ARRAY = 6;
}

message ActionParameter {
  string name = 1;
  FieldType type = 2;
  bool required = 3;
  repeated string enum_values = 4;
  string description = 5;
  string default_value = 6;
}

message ActionResultField {
  string name = 1;
  FieldType type = 2;
  string description = 3;
  repeated ActionResultField children = 4;
}

message ActionSchema {
  string id = 1;
  string action_type = 2;
  string display_name = 3;
  string description = 4;
  repeated ActionParameter parameters = 5;
  repeated ActionResultField result_schema = 6;
  bool require_approval = 7;
}

message ActionExecution {
  string id = 1;
  string ticket_id = 2;
  string action_type = 3;
  string status = 4; // PENDING_APPROVAL, PENDING, IN_PROGRESS, COMPLETED, FAILED, REJECTED
  map<string, string> parameters = 5;
  map<string, string> result_metadata = 6;
  string executing_user = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message ListActionSchemasRequest {}

message ListActionSchemasResponse {
  repeated ActionSchema schemas = 1;
}

message SubmitActionRequest {
  string ticket_id = 1;
  string action_type = 2;
  map<string, string> parameters = 3;
}

message SubmitActionResponse {
  ActionExecution execution = 1;
}

message ListActionExecutionsRequest {
  string ticket_id = 1;
  PaginationRequest pagination = 2;
}

message ListActionExecutionsResponse {
  repeated ActionExecution executions = 1;
  PaginationResponse pagination = 2;
}

service ActionService {
  rpc ListActionSchemas(ListActionSchemasRequest) returns (ListActionSchemasResponse) {
    option (google.api.http) = {
      get: "/v1/action-schemas"
    };
  }
  rpc SubmitAction(SubmitActionRequest) returns (SubmitActionResponse) {
    option (google.api.http) = {
      post: "/v1/actions"
      body: "*"
    };
  }
  rpc ListActionExecutions(ListActionExecutionsRequest) returns (ListActionExecutionsResponse) {
    option (google.api.http) = {
      get: "/v1/tickets/{ticket_id}/action-executions"
    };
  }
}
