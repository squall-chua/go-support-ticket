syntax = "proto3";

package api.v1;

option go_package = "github.com/squall-chua/go-support-ticket/api/v1;apiv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "api/proto/v1/common.proto";
import "google/api/annotations.proto";
import "api/proto/v1/options.proto";

enum FieldType {
  FIELD_TYPE_UNSPECIFIED = 0;
  FIELD_TYPE_STRING = 1;
  FIELD_TYPE_INTEGER = 2;
  FIELD_TYPE_FLOAT = 3;
  FIELD_TYPE_BOOLEAN = 4;
  FIELD_TYPE_ENUM = 5;
  FIELD_TYPE_OBJECT = 6;
  FIELD_TYPE_ARRAY = 7;
}

enum ActionStatus {
  ACTION_STATUS_UNSPECIFIED = 0;
  ACTION_STATUS_PENDING_APPROVAL = 1;
  ACTION_STATUS_PENDING = 2;
  ACTION_STATUS_IN_PROGRESS = 3;
  ACTION_STATUS_COMPLETED = 4;
  ACTION_STATUS_FAILED = 5;
  ACTION_STATUS_REJECTED = 6;
}

message ActionParameter {
  string name = 1;
  FieldType type = 2;
  bool required = 3;
  repeated string enum_values = 4;
  string description = 5;
  google.protobuf.Value default_value = 6;
}

message ActionResultField {
  string name = 1;
  FieldType type = 2;
  string description = 3;
  repeated ActionResultField children = 4;
}

message ActionSchema {
  string id = 1;
  string action_type = 2;
  string display_name = 3;
  string description = 4;
  repeated ActionParameter parameters = 5;
  repeated ActionResultField result_schema = 6;
  bool require_approval = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  google.protobuf.Timestamp deleted_at = 10;
}

message ActionExecution {
  string id = 1;
  string ticket_id = 2;
  string ticket_type = 3;
  string action_type = 4;
  ActionStatus status = 5;
  map<string, google.protobuf.Value> parameters = 6;
  ActionExecutionResult result = 7;
  string executing_user = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  google.protobuf.Timestamp execute_at = 11;
}

enum ActionExecutionStatus {
  ACTION_EXECUTION_STATUS_UNSPECIFIED = 0;
  ACTION_EXECUTION_STATUS_COMPLETED = 1;
  ACTION_EXECUTION_STATUS_FAILED = 2;
}

message ActionExecutionResult {
  string execution_id = 1;
  ActionExecutionStatus status = 2;
  string error = 3;
  string logs = 4;
  google.protobuf.Timestamp completed_at = 5;
  map<string, google.protobuf.Value> results = 6;
}

message ListActionSchemasRequest {
  repeated string ids = 1;
  repeated string action_types = 2;
  string display_name = 3;
  optional bool require_approval = 4;
  TimeRange time_range = 5;
  PageRequest pagination = 6;
  bool include_deleted = 7;
}

message ListActionSchemasResponse {
  repeated ActionSchema schemas = 1;
  PageInfo pagination = 2;
}

message ExecuteActionRequest {
  string ticket_id = 1;
  string action_type = 2;
  map<string, google.protobuf.Value> parameters = 3;
}

message GetActionExecutionRequest {
  string execution_id = 1;
}

message ListActionExecutionsRequest {
  repeated string ids = 1;
  repeated string ticket_ids = 2;
  repeated string action_types = 3;
  repeated ActionStatus statuses = 4;
  repeated string executing_users = 5;
  TimeRange time_range = 6;
  PageRequest pagination = 7;
}

message ListActionExecutionsResponse {
  repeated ActionExecution executions = 1;
  PageInfo pagination = 2;
}

message UpdateActionSchemaRequest {
  string id = 1;
  optional string display_name = 2;
  optional string description = 3;
  repeated ActionParameter parameters = 4;
  repeated ActionResultField result_schema = 5;
  optional bool require_approval = 6;
}

message UpdateActionSchemaResponse {
  ActionSchema schema = 1;
}

message CreateActionSchemaRequest {
  string action_type = 1;
  string display_name = 2;
  string description = 3;
  repeated ActionParameter parameters = 4;
  repeated ActionResultField result_schema = 5;
  bool require_approval = 6;
}

message CreateActionSchemaResponse {
  ActionSchema schema = 1;
}

message DeleteActionSchemaRequest {
  string id = 1;
}

message DeleteActionSchemaResponse {}

service ActionService {
  rpc ExecuteAction(ExecuteActionRequest) returns (ActionExecution) {
    option (google.api.http) = {
      post: "/api/v1/actions"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:actions"]
      required_roles: ["admin", "agent"]
    };
  }
  rpc GetActionExecution(GetActionExecutionRequest) returns (ActionExecution) {
    option (google.api.http) = {
      get: "/api/v1/action-executions/{execution_id}"
    };
    option (auth.v1.rule) = {
      required_scopes: ["read:actions"]
    };
  }
  rpc ListActionExecutions(ListActionExecutionsRequest) returns (ListActionExecutionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/action-executions"
    };
    option (auth.v1.rule) = {
      required_scopes: ["read:actions"]
    };
  }
  rpc CreateActionSchema(CreateActionSchemaRequest) returns (CreateActionSchemaResponse) {
    option (google.api.http) = {
      post: "/api/v1/action-schemas"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:actions"]
      required_roles: ["admin"]
    };
  }
  rpc ListActionSchemas(ListActionSchemasRequest) returns (ListActionSchemasResponse) {
    option (google.api.http) = {
      get: "/api/v1/action-schemas"
    };
    option (auth.v1.rule) = {
      required_scopes: ["read:actions"]
    };
  }
  rpc UpdateActionSchema(UpdateActionSchemaRequest) returns (UpdateActionSchemaResponse) {
    option (google.api.http) = {
      put: "/api/v1/action-schemas/{id}"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:actions"]
      required_roles: ["admin"]
    };
  }
  rpc DeleteActionSchema(DeleteActionSchemaRequest) returns (DeleteActionSchemaResponse) {
    option (google.api.http) = {
      delete: "/api/v1/action-schemas/{id}"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:actions"]
      required_roles: ["admin"]
    };
  }
}
