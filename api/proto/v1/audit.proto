syntax = "proto3";

package api.v1;

option go_package = "github.com/squall-chua/go-support-ticket/api/v1;apiv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "api/proto/v1/common.proto";
import "google/api/annotations.proto";
import "api/proto/v1/options.proto";

message AuditEntry {
  string id = 1;
  string ticket_id = 2;
  string user_id = 3;
  string action = 4;
  string details = 5;
  map<string, google.protobuf.Value> metadata = 6;
  google.protobuf.Timestamp created_at = 7;
}

message ListAuditTrailRequest {
  string ticket_id = 1;
  PageRequest pagination = 2;
}

message ListAuditTrailResponse {
  repeated AuditEntry entries = 1;
  PageInfo pagination = 2;
}

service AuditService {
  rpc ListAuditTrail(ListAuditTrailRequest) returns (ListAuditTrailResponse) {
    option (google.api.http) = {
      get: "/api/v1/tickets/{ticket_id}/audit-trail"
    };
    option (auth.v1.rule) = {
      required_scopes: ["read:audit"]
      required_roles: ["admin"]
    };
  }
}
