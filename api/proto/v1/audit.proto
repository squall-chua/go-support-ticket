syntax = "proto3";

package api.v1;

option go_package = "github.com/squall-chua/go-support-ticket/api/v1;apiv1";

import "google/protobuf/timestamp.proto";
import "api/proto/v1/common.proto";
import "google/api/annotations.proto";

message AuditEntry {
  string id = 1;
  string ticket_id = 2;
  string actor = 3;
  string action = 4;
  map<string, string> metadata = 5;
  google.protobuf.Timestamp created_at = 6;
}

message ListAuditTrailRequest {
  string ticket_id = 1;
  PaginationRequest pagination = 2;
}

message ListAuditTrailResponse {
  repeated AuditEntry entries = 1;
  PaginationResponse pagination = 2;
}

service AuditService {
  rpc ListAuditTrail(ListAuditTrailRequest) returns (ListAuditTrailResponse) {
    option (google.api.http) = {
      get: "/v1/tickets/{ticket_id}/audit-trail"
    };
  }
}
