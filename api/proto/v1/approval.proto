syntax = "proto3";

package api.v1;

option go_package = "github.com/squall-chua/go-support-ticket/api/v1;apiv1";

import "google/protobuf/timestamp.proto";
import "api/proto/v1/common.proto";
import "google/api/annotations.proto";
import "api/proto/v1/options.proto";

message ApprovalConfig {
  string action = 1;
  string ticket_type = 2;
  int32 required_approvals = 3;
  repeated string eligible_roles = 4;
}

enum ApprovalStatus {
  APPROVAL_STATUS_UNSPECIFIED = 0;
  APPROVAL_STATUS_PENDING = 1;
  APPROVAL_STATUS_APPROVED = 2;
  APPROVAL_STATUS_REJECTED = 3;
}

message ApprovalRequestData {
  string id = 1;
  string ticket_id = 2;
  string action = 3;
  string execution_id = 4;
  string requester = 5;
  ApprovalStatus status = 6;
  int32 required_approvals = 7;
  repeated ApprovalDecision decisions = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message ApprovalDecision {
  string approver = 1;
  bool approved = 2;
  string reason = 3;
  google.protobuf.Timestamp decided_at = 4;
}

message DecideApprovalRequest {
  string approval_request_id = 1;
  bool approve = 2;
  string reason = 3;
}

message DecideApprovalResponse {
  ApprovalRequestData request = 1;
}

message CreateApprovalRequest {
  string ticket_id = 1;
  string action = 2;
  string execution_id = 3;
}

message CreateApprovalResponse {
  ApprovalRequestData request = 1;
}

message ListApprovalsRequest {
  repeated string ticket_ids = 1;
  repeated string actions = 2;
  repeated string requesters = 3;
  repeated ApprovalStatus statuses = 4;
  repeated string execution_ids = 5;
  repeated int32 required_approvals = 6;
  repeated string approvers = 7;
  TimeRange time_range = 8;
  PageRequest pagination = 9;
}

message ListApprovalsResponse {
  repeated ApprovalRequestData requests = 1;
  PageInfo pagination = 2;
}

service ApprovalService {
  rpc CreateApproval(CreateApprovalRequest) returns (CreateApprovalResponse) {
    option (google.api.http) = {
      post: "/api/v1/approvals"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:approvals"]
      required_roles: ["admin", "agent", "system"]
    };
  }
  rpc DecideApproval(DecideApprovalRequest) returns (DecideApprovalResponse) {
    option (google.api.http) = {
      post: "/api/v1/approvals/{approval_request_id}/decide"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:approvals"]
      required_roles: ["admin", "approver"]
    };
  }
  rpc ListApprovals(ListApprovalsRequest) returns (ListApprovalsResponse) {
    option (google.api.http) = {
      get: "/api/v1/approvals"
    };
    option (auth.v1.rule) = {
      required_scopes: ["read:approvals"]
      required_roles: ["admin", "approver", "agent"]
    };
  }
}
