syntax = "proto3";

package api.v1;

option go_package = "github.com/squall-chua/go-support-ticket/api/v1;apiv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "api/proto/v1/common.proto";
import "google/api/annotations.proto";
import "api/proto/v1/options.proto";

message ApprovalConfig {
  string ticket_type = 1;
  string action_type = 2;
  int32 required_approvals = 3;
  repeated string eligible_roles = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  google.protobuf.Timestamp deleted_at = 7;
}

message CreateApprovalConfigRequest {
  ApprovalConfig config = 1;
}

message CreateApprovalConfigResponse {
  ApprovalConfig config = 1;
}

message GetApprovalConfigRequest {
  string ticket_type = 1;
  string action_type = 2;
}

message UpdateApprovalConfigRequest {
  string ticket_type = 1;
  string action_type = 2;
  int32 required_approvals = 3;
  repeated string eligible_roles = 4;
}

message UpdateApprovalConfigResponse {
  ApprovalConfig config = 1;
}

message DeleteApprovalConfigRequest {
  string ticket_type = 1;
  string action_type = 2;
}

message DeleteApprovalConfigResponse {}

message ListApprovalConfigsRequest {
  repeated string ticket_types = 1;
  repeated string action_types = 2;
  int32 required_approvals = 3;
  repeated string eligible_roles = 4;
  TimeRange time_range = 5;
  bool include_deleted = 6;
  PageRequest pagination = 7;
}

message ListApprovalConfigsResponse {
  repeated ApprovalConfig configs = 1;
  PageInfo pagination = 2;
}

enum ApprovalStatus {
  APPROVAL_STATUS_UNSPECIFIED = 0;
  APPROVAL_STATUS_PENDING = 1;
  APPROVAL_STATUS_APPROVED = 2;
  APPROVAL_STATUS_REJECTED = 3;
}

message ApprovalRequestData {
  string id = 1;
  string ticket_id = 2;
  string ticket_type = 3;
  string action_type = 4;
  string target_id = 5;
  string requester = 6;
  string origin = 7;
  map<string, google.protobuf.Value> metadata = 8;
  ApprovalStatus status = 9;
  int32 required_approvals = 10;
  repeated string eligible_roles = 11;
  repeated ApprovalDecision decisions = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message ApprovalDecision {
  string approver = 1;
  bool approved = 2;
  string reason = 3;
  google.protobuf.Timestamp decided_at = 4;
}

message DecideApprovalRequest {
  string approval_request_id = 1;
  bool approve = 2;
  string reason = 3;
}

message DecideApprovalResponse {
  ApprovalRequestData request = 1;
}

message CreateApprovalRequest {
  string ticket_id = 1;
  string target_id = 2;
  string ticket_type = 3;
  string action_type = 4;
  string origin = 5;
  map<string, google.protobuf.Value> metadata = 6;
}

message CreateApprovalResponse {
  ApprovalRequestData request = 1;
}

message ListApprovalsRequest {
  repeated string ticket_ids = 1;
  repeated string ticket_types = 2;
  repeated string action_types = 3;
  repeated string requesters = 4;
  repeated string origins = 5;
  repeated ApprovalStatus statuses = 6;
  repeated string target_ids = 7;
  repeated int32 required_approvals = 8;
  repeated string approvers = 9;
  TimeRange time_range = 10;
  PageRequest pagination = 11;
}

message ListApprovalsResponse {
  repeated ApprovalRequestData requests = 1;
  PageInfo pagination = 2;
}

service ApprovalService {
  rpc CreateApproval(CreateApprovalRequest) returns (CreateApprovalResponse) {
    option (google.api.http) = {
      post: "/api/v1/approvals"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:approvals"]
      required_roles: ["admin", "agent", "system"]
    };
  }
  rpc DecideApproval(DecideApprovalRequest) returns (DecideApprovalResponse) {
    option (google.api.http) = {
      post: "/api/v1/approvals/{approval_request_id}/decide"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:approvals"]
      required_roles: ["admin", "approver"]
    };
  }
  rpc ListApprovals(ListApprovalsRequest) returns (ListApprovalsResponse) {
    option (google.api.http) = {
      get: "/api/v1/approvals"
    };
    option (auth.v1.rule) = {
      required_scopes: ["read:approvals"]
      required_roles: ["admin", "approver", "agent"]
    };
  }

  rpc CreateApprovalConfig(CreateApprovalConfigRequest) returns (CreateApprovalConfigResponse) {
    option (google.api.http) = {
      post: "/api/v1/approval-configs"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:approvals"]
      required_roles: ["admin"]
    };
  }
  rpc GetApprovalConfig(GetApprovalConfigRequest) returns (ApprovalConfig) {
    option (google.api.http) = {
      get: "/api/v1/approval-configs/{ticket_type}/{action_type}"
    };
    option (auth.v1.rule) = {
      required_scopes: ["read:approvals"]
      required_roles: ["admin", "approver", "agent"]
    };
  }
  rpc UpdateApprovalConfig(UpdateApprovalConfigRequest) returns (UpdateApprovalConfigResponse) {
    option (google.api.http) = {
      put: "/api/v1/approval-configs/{ticket_type}/{action_type}"
      body: "*"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:approvals"]
      required_roles: ["admin"]
    };
  }
  rpc DeleteApprovalConfig(DeleteApprovalConfigRequest) returns (DeleteApprovalConfigResponse) {
    option (google.api.http) = {
      delete: "/api/v1/approval-configs/{ticket_type}/{action_type}"
    };
    option (auth.v1.rule) = {
      required_scopes: ["write:approvals"]
      required_roles: ["admin"]
    };
  }
  rpc ListApprovalConfigs(ListApprovalConfigsRequest) returns (ListApprovalConfigsResponse) {
    option (google.api.http) = {
      get: "/api/v1/approval-configs"
    };
    option (auth.v1.rule) = {
      required_scopes: ["read:approvals"]
      required_roles: ["admin", "approver", "agent"]
    };
  }
}
